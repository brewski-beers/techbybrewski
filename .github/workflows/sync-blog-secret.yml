name: Sync BLOG_SCHEDULER_SECRET

# Single source of truth for BLOG_SCHEDULER_SECRET. Writes the same value to:
#   1. GitHub Actions secret (consumed by blog-scheduler.yml + blog-publisher.yml)
#   2. Vercel env vars in production/preview/development (consumed by /api/blog/* routes)
# Then triggers a Vercel production redeploy so the new value takes effect.
#
# Never edit BLOG_SCHEDULER_SECRET directly in either UI — always run this workflow.

on:
  workflow_dispatch:
    inputs:
      new_secret:
        description: 'New secret value (leave blank to auto-generate a 48-char random string)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve secret value
        id: resolve
        env:
          INPUT_SECRET: ${{ inputs.new_secret }}
        run: |
          if [ -z "$INPUT_SECRET" ]; then
            VALUE=$(openssl rand -hex 24)
            echo "Generated new 48-char secret"
          else
            VALUE="$INPUT_SECRET"
            echo "Using provided secret"
          fi
          echo "::add-mask::$VALUE"
          echo "value=$VALUE" >> $GITHUB_OUTPUT

      - name: Update GitHub Actions secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_WRITE }}
          NEW_VALUE: ${{ steps.resolve.outputs.value }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: GH_PAT_SECRETS_WRITE secret is required (PAT with repo > secrets:write)" >&2
            exit 1
          fi
          gh secret set BLOG_SCHEDULER_SECRET --body "$NEW_VALUE" --repo "${{ github.repository }}"
          echo "✓ GitHub Actions secret updated"

      - name: Update Vercel env vars (production, preview, development)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEW_VALUE: ${{ steps.resolve.outputs.value }}
        run: |
          for required in VERCEL_TOKEN VERCEL_TEAM_ID VERCEL_PROJECT_ID; do
            if [ -z "${!required}" ]; then
              echo "ERROR: $required secret is required" >&2
              exit 1
            fi
          done

          curl -sf "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" > /tmp/envs.json

          # Vercel may return one row covering multiple targets, or separate rows per target.
          # Dedupe IDs and delete each exactly once.
          IDS=$(jq -r '.envs[] | select(.key == "BLOG_SCHEDULER_SECRET") | .id' /tmp/envs.json | sort -u)
          for ID in $IDS; do
            echo "Deleting existing env var ($ID)..."
            curl -sf -X DELETE "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env/$ID?teamId=$VERCEL_TEAM_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" > /dev/null
          done

          echo "Creating new env var across production/preview/development..."
          curl -sf -X POST "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg v "$NEW_VALUE" '{key:"BLOG_SCHEDULER_SECRET",value:$v,target:["production","preview","development"],type:"encrypted"}')" > /dev/null
          echo "✓ Vercel env var updated across all 3 environments"

      - name: Redeploy production with new env
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Fetch the most recent READY production deployment ID, then redeploy it.
          # This mirrors what `vercel redeploy <url>` does internally.
          DEPLOY_ID=$(curl -sf "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&target=production&state=READY&limit=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.deployments[0].uid')
          if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
            echo "ERROR: could not find a READY production deployment to redeploy" >&2
            exit 1
          fi
          echo "Redeploying $DEPLOY_ID..."
          NEW_DEPLOY=$(curl -sf -X POST "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID&forceNew=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg id "$DEPLOY_ID" '{name:"techbybrewski",deploymentId:$id,target:"production"}')")
          NEW_ID=$(echo "$NEW_DEPLOY" | jq -r '.id // .uid // empty')
          NEW_URL=$(echo "$NEW_DEPLOY" | jq -r '.url // empty')
          if [ -z "$NEW_ID" ]; then
            echo "ERROR: redeploy did not return an ID. Response:" >&2
            echo "$NEW_DEPLOY" | jq . >&2
            exit 1
          fi
          echo "✓ Redeploy queued: $NEW_ID (https://$NEW_URL)"
          echo "DEPLOY_ID=$NEW_ID" >> $GITHUB_ENV

      - name: Wait for deploy to be READY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          for i in $(seq 1 40); do
            STATE=$(curl -sf "https://api.vercel.com/v13/deployments/$DEPLOY_ID?teamId=$VERCEL_TEAM_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.readyState')
            echo "[$i] state=$STATE"
            case "$STATE" in
              READY) echo "✓ Deploy is READY"; exit 0 ;;
              ERROR|CANCELED) echo "✗ Deploy ended in $STATE" >&2; exit 1 ;;
            esac
            sleep 15
          done
          echo "✗ Timed out waiting for deploy" >&2
          exit 1
