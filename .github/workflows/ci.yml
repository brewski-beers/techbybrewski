name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - 'package*.json'
              - '.github/workflows/**'
              - 'next.config.*'
              - 'tsconfig*.json'
              - '.eslintrc*'
              - 'eslint.config.*'

  verify:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          # Prevent Firestore Admin SDK from erroring at build time
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: techbybrewski
